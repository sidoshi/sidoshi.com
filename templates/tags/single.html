{% extends "base.html" %}

{% block title %}#{{ term.name }} | {{ config.title }}{% endblock %}

{% block content %}
<h1>
  #{{ term.name }}
  <a href="{{ term.permalink }}atom.xml" aria-label="RSS Feed for #{{ term.name }}" title="RSS Feed for #{{ term.name }}">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 3C12.9411 3 21 11.0589 21 21H18C18 12.7157 11.2843 6 3 6V3ZM3 10C9.07513 10 14 14.9249 14 21H11C11 16.5817 7.41828 13 3 13V10ZM3 17C5.20914 17 7 18.7909 7 21H3V17Z" fill="currentColor"/></svg>
  </a>
</h1>
<ul class="post-list">
  {% for page in term.pages %}
  <li>
    <a href="{{ page.permalink }}">{{ page.title }}</a>
    <time datetime="{{ page.date }}">{{ page.date | date(format="%b %d, %Y") }}</time>
  </li>
  {% endfor %}
</ul>
{% endblock %}
